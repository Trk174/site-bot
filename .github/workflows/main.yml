name: Site Keep Alive

on:
  schedule:
    # Rulează la fiecare 20 de minute
    - cron: '*/20 * * * *'
  workflow_dispatch: # Permite pornirea manuală

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium

      - name: Run bot
        run: python bot.py
